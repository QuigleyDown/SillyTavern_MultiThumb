<div class="multithumbs-settings inline-drawer">
    <div class="inline-drawer-header">
        <b>SillyTavern-MultiThumb Settings</b>
        <div class="inline-drawer-icon fa-solid fa-chevron-down"></div>
    </div>
    <div class="inline-drawer-content" style="display: none;">
        <div class="setup_item">
            <div class="field_title">Avatar Width (px)</div>
            <div class="flex-container">
                <input type="range" id="multithumbs_width" min="30" max="150" step="5" />
                <span id="multithumbs_width_value">70</span>px
            </div>
            <div class="field_description">Adjust the width of character thumbnails in messages.</div>
        </div>
    </div>
</div>
